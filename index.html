<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>行草連連看</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>行草連連看</h1>
            <div class="game-controls top-controls">
                <div class="control-row">
                    <label for="grid-size">网格:</label>
                    <select id="grid-size">
                        <option value="4">4×4</option>
                        <option value="6" selected>6×6</option>
                        <option value="8">8×8</option>
                        <option value="10">10×10</option>
                    </select>
                </div>
                <div class="control-row">
                    <label for="difficulty">字库:</label>
                    <select id="difficulty">
                        <option value="1" selected>一级</option>
                        <option value="2">二级</option>
                        <option value="3">三级</option>
                        <option value="4">草诀谱</option>
                        <option value="5">书谱</option>
                    </select>
                </div>
            </div>
            <div class="game-info">
                <div class="score">分数: <span id="score">0</span></div>
                <div class="time">时间: <span id="time">00:00</span></div>
            </div>
        </header>
        
        <main class="game-board">
            <div id="grid-container"></div>
        </main>
        
        <footer class="game-controls bottom-controls">
            <button id="restart-btn">重新开始</button>
            <button id="hint-btn">提示</button>
            <button id="shuffle-btn">打乱</button>
        </footer>
        
        <div id="game-over-modal" class="modal hidden">
            <div class="modal-content">
                <h2 id="modal-title">游戏结束</h2>
                <p id="modal-message">最终得分: 0</p>
                <button id="modal-restart-btn">再来一局</button>
            </div>
        </div>
    </div>
    
    <script src="chars.js?v=20250117"></script>
    <script src="script.js?v=20250117"></script>
</body>
</html>
